<html>
  <head>
    <meta charset="utf-8">
    <link rel="icon" href="pix/ico/favicon.ico">

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <title>A-Frame Starter</title>

  </head>
  <body>
    <a-scene>
      <a-assets>
            <img id="logo" src="pix/IAM_logo.png">
      </a-assets>

      <a-entity light="type: spot; position 0 0 10; angle 90"></a-entity>

      <a-entity 
      geometry="primitive: plane; width: 12; height: 12" 
      material="color: #50C878" 
      position="0 0 -4"
      rotation="-90 0 0">
      </a-entity>

      <a-entity 
      geometry="primitive: box; width: 3; height: 1; depth: 3" 
      position="0 0.75 -5" 
      rotation="0 0 0"
      material="color: gray"
      animation__rot="property: rotation; to: 0 0 0; loop: true; dur: 4000; easing: linear">
    
      <a-entity
      geometry="primitive: box; height: 3"
      material="color: darkslategray"
      position="0 2d 0"
      animation__rot="property: rotation; to: 0 0 0; loop: true; dur: 1000; easing: linear"> 

      <a-entity
      geometry="primitive: box; height: 4"
      material="color: white"
      position="0 3.5 0"
      animation__rot="property: rotation; to: 0 0 0; loop: true; dur: 1000; easing: linear">
      
       <a-entity
      geometry="primitive: torus; radius: 3"
      material="color: white"
      position="0 0.3 1"
      animation__rot="property: rotation; to: 0 0 0; loop: true; dur: 1000; easing: linear">

      <a-entity
      geometry="primitive: box; width:1.5"
      material="color: black"
      position="0 0 0"
      animation__rot="property: rotation; to: 0 0 360; loop: true; dur: 1000; easing: linear"> 
            
      <a-entity
      geometry="primitive: box; height: 2; width: 1.5"
      material="color: blue"
      position="0 1.5 0"
      rotation="0 0 0"
      animation__rot="property: rotation; to: 0 0 0; loop: true; dur: 1000; easing: linear"> 
       
      <a-entity
      geometry="primitive: box; height: 2; width: 1.5"
      material="color: blue"
      position="0 -3 0"
      rotation="0 0 0"
      animation__rot="property: rotation; to: 0 0 0; loop: true; dur: 1000; easing: linear"> 
      </a-entity>

      <a-entity
      geometry="primitive: box; height: 2; width: 1.5"
      material="color: blue"
      position="1.6 -1.5 0"
      rotation="0 0 90"
      animation__rot="property: rotation; to: 0 0 90; loop: true; dur: 1000; easing: linear"> 

      <a-entity
      geometry="primitive: box; height: 2; width: 1.5"
      material="color: blue"
      position="0 3.3 0"
      rotation="0 0 0"
      animation__rot="property: rotation; to: 0 0 0; loop: true; dur: 1000; easing: linear"> 
      </a-entity>

      </a-entity>

      
      </a-entity>

      <a-sky color="#898989"></a-sky>
    </a-scene>
  </body>
</html>
