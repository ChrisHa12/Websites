<html>
  <head>
    <meta charset="utf-8">
    <link rel="icon" href="pix/ico/favicon.ico">

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <title>Fan on a Desk</title>

  </head>
  <body>
    <a-scene>
      <a-assets>
            <img id="plastic" src="worn-old-plastic_albedo.png">
            <img id="plasticNorm" src="worn-old-plastic-normal-ogl.png">
      </a-assets>

      <a-camera>
        <a-cursor></a-cursor>
      </a-camera>

      <a-entity 
      geometry="primitive: box; width: 24; height: 12" 
      material="color: #876E4B" 
      position="0 0 -4"
      rotation="-90 0 0">
      </a-entity>

      <a-entity
      geometry="primitive: plane; height: 8; width: 5"
      material="color: #00000"
      position="7 0.6 -3.5"
      rotation="-90 0 0">
      </a-entity>

      <a-entity
      geometry="primitive: cylinder; radius: 0.5; height: 15"
      material="color: #C4C4C4"
      position="10 -8 -8">
      </a-entity>

      <a-entity
      geometry="primitive: cylinder; radius: 0.5; height: 15"
      material="color: #C4C4C4"
      position="-10 -8 -8">
      </a-entity>

      <a-entity
      geometry="primitive: cylinder; radius: 0.5; height: 15"
      material="color: #C4C4C4"
      position="10 -8 0">
      </a-entity>

      <a-entity
      geometry="primitive: cylinder; radius: 0.5; height: 15"
      material="color: #C4C4C4"
      position="-10 -8 0">
      </a-entity>

      <a-entity 
      geometry="primitive: box; width: 3; height: 1; depth: 3" 
      position="-6 1 -6" 
      rotation="0 0 0"
      material="src:#plastic; normalMap:#plasticNorm; normalScale: 2 2 ; 4 4"
      animation__rot="property: rotation; to: 0 0 0; loop: true; dur: 4000; easing: linear">
    
      <a-entity
      geometry="primitive: box; width: 1.1; height: 3; depth: 1.1"
      material="src:#plastic; normalMap:#plasticNorm; normalScale: 2 2 ; 4 4"
      position="0 2 0"
      animation__rot="property: rotation; to: 0 0 0; loop: true; dur: 1000; easing: linear"> 

      <a-entity
      geometry="primitive: box; height: 4"
      material="color: white"
      position="0 3.5 0"
      rotation="0 -60 0"
      animation__mouseenter="property: rotation; to: 0 -60 0; loop: true; dur: 3000; dir: alternate; easing: linear; startEvents: mouseenter"
      animation__mouseleave="property: rotation; to: 0 60 0; loop: true; dur: 3000; dir: alternate; easing: linear; startEvents: mouseleave"
      animation__customevent="property: rotation; from: 0 -60 0; to: 0 60 0; loop: true; dur: 3000; dir: alternate; easing: linear; startEvents: triggeranimation">
      
      <a-entity
      geometry="primitive: torus; radius: 3"
      material="color: white"
      position="0 0.7 1"
      animation__rot="property: rotation; to: 0 0 0; loop: true; dur: 1000; easing: linear">

      <a-entity
      geometry="primitive: box; width: 1.5; depth: 0.9"
      material="color: white"
      position="0 0 0"
      sound="src: url(freesound_community-my-room-and-its-noisy-fan-27352.mp3); autoplay:false; loop: true; on: click"
      animation__rot="property: rotation; from: 0 0 0; to: 0 0 360; loop: true; dur: 1000; easing: linear; playSound; startEvents: click;"> 
            
      <a-entity
      geometry="primitive: box; height: 2; width: 1.5; depth: 0.9"
      material="color: white"
      position="0 1.5 0"
      rotation="0 0 0"
      animation__rot="property: rotation; to: 0 0 0; loop: true; dur: 1000; easing: linear"> 
       
      <a-entity
      geometry="primitive: box; height: 2; width: 1.5; depth: 0.9"
      material="color: white"
      position="0 -3 0"
      rotation="0 0 0"
      animation__rot="property: rotation; to: 0 0 0; loop: true; dur: 1000; easing: linear"> 
      </a-entity>

      <a-entity
      geometry="primitive: box; height: 2; width: 1.5; depth: 0.9"
      material="color: white"
      position="1.6 -1.5 0"
      rotation="0 0 90"
      animation__rot="property: rotation; to: 0 0 90; loop: true; dur: 1000; easing: linear"> 

      <a-entity
      geometry="primitive: box; height: 2; width: 1.5; depth: 0.9"
      material="color: white"
      position="0 3.3 0"
      rotation="0 0 0"
      animation__rot="property: rotation; to: 0 0 0; loop: true; dur: 1000; easing: linear"> 
      </a-entity>
      </a-entity>      
      </a-entity>
      </a-entity>
      </a-entity>
      </a-entity>
      </a-entity>
      </a-entity>
      </a-entity>
      <a-entity
      geometry="primitive:cone; radiusBottom: 4; radiusTop: 1.5; height: 5; radiusTop"
      position="-3 20 -5"
      material="color: #D6B588">
      <a-entity
      geometry="primitive: sphere; radius: 2.3; segmentsHeight: 18"
      material="emissive: #FDAE44; emissiveIntensity: 3"
      position="0 -1 0">
      <a-entity 
      light="types: spot; position 0 -2 0; intensity: 5; angle 0">
      </a-entity>

      <a-sky color="#877F7D"></a-sky>
    </a-scene>
  </body>
</html>
