<html>
  <head>
    <meta charset="utf-8">
    <link rel="icon" href="pix/ico/favicon.ico">

    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"></script>
    <title>A-Frame Starter</title>

  </head>
  <body>
    <a-scene>
      <a-assets>
            <img id="logo" src="pix/IAM_logo.png">
      </a-assets>

      <a-entity light="type: spot; position 0 0 -3; angle 45"></a-entity>

      <a-entity 
      geometry="primitive: sphere; radius 0.8" 
      position="0 1.25 -5" 
      rotation="0 0 0"
      material="color: darkorange"
      animation__rot="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear" 
      animation__pos="property: positwion; to : 0 1.5 -5; dir: alternate; loop: true; easing: easeInOutSine; dur: 2000">
      
      <a-entity
      geometry="primitive: sphere; radius: 0.1"
      material="color: blue"
      position="-0.5 0 -2"
      animation__rot="property: rotation; to: 0 0 360; loop: true; dur: 1000; easing: linear">
            
      <a-entity
      geometry="primitive: sphere; radius: 0.12"
      material="color: gray"
      position="-0 0 -0.5"
      animation__rot="property: rotation; to: 0 0 360; loop: true; dur: 1000; easing: linear">

      <a-entity
      geometry="primitive: sphere; radius: 0.15"
      material="color: blue"
      position="-0 0 -0.5"
      animation__rot="property: rotation; to: 0 0 360; loop: true; dur: 1000; easing: linear">
            
      <a-entity
      geometry="primitive: sphere; radius: 0.14"
      material="color: gray"
      position="-0 0 -0.5"
      animation__rot="property: rotation; to: 0 0 360; loop: true; dur: 1000; easing: linear">

      <a-entity
      geometry="primitive: sphere; radius: 0.4"
      material="color: blue"
      position="-0 0 -0.5"
      animation__rot="property: rotation; to: 0 0 360; loop: true; dur: 1000; easing: linear">
            
      <a-entity
      geometry="primitive: sphere; radius: 0.4"
      material="color: gray"
      position="-0 0 -0.5"
      animation__rot="property: rotation; to: 0 0 360; loop: true; dur: 1000; easing: linear">

      <a-entity
      geometry="primitive: sphere; radius: 0.3"
      material="color: blue"
      position="-0 0 -0.5"
      animation__rot="property: rotation; to: 0 0 360; loop: true; dur: 1000; easing: linear">
            
      <a-entity
      geometry="primitive: sphere; radius: 0.3"
      material="color: gray"
      position="-0 0 -0.5"
      animation__rot="property: rotation; to: 0 0 360; loop: true; dur: 1000; easing: linear"></a-entity>
      </a-entity>

      </a-entity>

      </a-entity>

      </a-entity>

      </a-entity>

      </a-entity>

      </a-entity>

      </a-entity>

      </a-entity>

      <a-sky color="#13265C"></a-sky>
    </a-scene>
  </body>
</html>
